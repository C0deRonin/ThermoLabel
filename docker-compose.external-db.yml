version: '3.8'

# This compose file is for running ThermoLabel with an existing external database
# Use this when you want to connect to a PostgreSQL database on another server or machine

services:
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermolabel-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://thermolabel_user:thermolabel_password@postgres:5432/thermolabel_db}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - thermolabel-network
    restart: unless-stopped
    # No depends_on - database is external and should already be running

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: thermolabel-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://thermolabel-backend:8000}
      RUNNING_IN_DOCKER: "1"
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c '
      npm run dev
      '
    networks:
      - thermolabel-network
    restart: unless-stopped

networks:
  thermolabel-network:
    driver: bridge
    name: thermolabel-network
