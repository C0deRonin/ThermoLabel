version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: thermolabel-db
    environment:
      POSTGRES_DB: thermolabel_db
      POSTGRES_USER: thermolabel_user
      POSTGRES_PASSWORD: thermolabel_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermolabel_user -d thermolabel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thermolabel-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermolabel-backend
    environment:
      DATABASE_URL: postgresql://thermolabel_user:thermolabel_password@postgres:5432/thermolabel_db
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - thermolabel-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: thermolabel-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - thermolabel-network

volumes:
  postgres_data:
    driver: local

networks:
  thermolabel-network:
    driver: bridge
    name: thermolabel-network
