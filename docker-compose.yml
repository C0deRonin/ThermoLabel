services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: thermolabel-db
    environment:
      POSTGRES_DB: thermolabel_db
      POSTGRES_USER: thermolabel_user
      POSTGRES_PASSWORD: thermolabel_password
    ports:
      - "5432:5432"
    volumes:
      # Bind mount for data persistence
      - thermolabel_db_data:/var/lib/postgresql/data
      # Initialize database with dump file
      - ${PWD}/backend/init-db.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ${PWD}/database-dump.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thermolabel_user -d thermolabel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thermolabel-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermolabel-backend
    environment:
      DATABASE_URL: postgresql://thermolabel_user:thermolabel_password@postgres:5432/thermolabel_db
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - thermolabel-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: thermolabel-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_INTERNAL_URL: http://thermolabel-backend:8000
      RUNNING_IN_DOCKER: "1"
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
    # -H 0.0.0.0 чтобы приложение было доступно по localhost с хоста
    command: npm run dev -- -H 0.0.0.0
    networks:
      - thermolabel-network
    restart: unless-stopped

volumes:
  thermolabel_db_data:
    driver: local

networks:
  thermolabel-network:
    driver: bridge
    name: thermolabel-network
