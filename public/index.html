// public/index.html
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThermoLabel v2 - Thermal Image Annotation Tool</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "'JetBrains Mono', 'Courier New', monospace";
        background: #050608;
        color: #8ab0c8;
        overflow: hidden;
      }

      #__next {
        width: 100%;
        height: 100vh;
      }

      canvas {
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }

      input[type="range"] {
        -webkit-appearance: slider-horizontal;
        appearance: slider-horizontal;
        width: 100%;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #0d1117;
      }

      ::-webkit-scrollbar-thumb {
        background: #1a2332;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #2a3a44;
      }
    </style>
  </head>
  <body>
    <div id="__next"></div>
  </body>
</html>
